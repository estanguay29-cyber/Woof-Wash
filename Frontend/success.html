<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago exitoso</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#fffdf7,_#fff6d6_48%,_#eef5ff_100%)] text-slate-800" style="font-family: 'Inter', sans-serif;">

<div class="absolute inset-0 overflow-hidden pointer-events-none">
  <div class="absolute -top-16 -left-12 h-44 w-44 rounded-full bg-[#8cc63f]/20 blur-3xl"></div>
  <div class="absolute top-24 right-0 h-56 w-56 rounded-full bg-[#0b2a6b]/10 blur-3xl"></div>
  <div class="absolute bottom-0 left-1/2 h-52 w-52 -translate-x-1/2 rounded-full bg-[#8cc63f]/10 blur-3xl"></div>
</div>

<main class="relative mx-auto flex min-h-screen w-full max-w-4xl items-center justify-center px-5 py-10">
<section class="grid w-full overflow-hidden rounded-[2rem] border border-white/70 bg-white/85 shadow-[0_30px_90px_rgba(11,42,107,0.16)] backdrop-blur md:grid-cols-[0.9fr_1.1fr]">
<div class="flex flex-col justify-between bg-[linear-gradient(160deg,_#0b2a6b_0%,_#123f89_55%,_#8cc63f_135%)] p-8 text-white">
  <div>
    <div class="group inline-flex items-center gap-3 rounded-full border border-white/15 bg-white/10 px-4 py-2 text-sm font-semibold tracking-[0.2em] uppercase transition hover:scale-105">
      <span class="flex h-8 w-8 items-center justify-center rounded-full bg-[#8cc63f]/20 text-white transition group-hover:scale-110 group-hover:bg-[#8cc63f]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="6.5" cy="7.5" r="2.1"></circle>
          <circle cx="10" cy="5.6" r="2.05"></circle>
          <circle cx="14" cy="5.6" r="2.05"></circle>
          <circle cx="17.5" cy="7.5" r="2.1"></circle>
          <path d="M12 11.2c-2.7 0-5 2.05-5 4.55C7 18 8.7 19.4 10.9 19.4c.95 0 1.45-.28 2.1-.67.66.39 1.16.67 2.1.67 2.2 0 3.9-1.4 3.9-3.65 0-2.5-2.3-4.55-5-4.55-.86 0-1.48.19-2 .53-.52-.34-1.14-.53-2-.53z"></path>
        </svg>
      </span>
      Woof &amp; Wash
    </div>

    <div class="mt-8 flex h-20 w-20 items-center justify-center rounded-[1.7rem] bg-white/10 text-white shadow-[0_18px_40px_rgba(11,42,107,0.24)]">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6 9 17l-5-5"></path>
      </svg>
    </div>
  </div>

  <div class="mt-8 rounded-3xl border border-white/10 bg-white/10 p-5 backdrop-blur">
    <p class="text-xs font-bold uppercase tracking-[0.24em] text-white/70">Pedido</p>
    <p class="mt-2 text-sm font-semibold text-white/85">Gracias por confiar en Woof &amp; Wash.</p>
  </div>
</div>

<div class="p-6 sm:p-8">
  <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-[1.7rem] bg-[linear-gradient(145deg,_#ffffff,_#eef5ff)] shadow-[0_14px_35px_rgba(11,42,107,0.14)]">
    <img src="img/perritologo.png" alt="Woof & Wash" class="h-12 w-12 object-contain">
  </div>

  <h1 class="mt-5 text-center text-3xl font-extrabold text-green-600" style="font-family: 'Poppins', sans-serif;">
    ¡Pago exitoso!
  </h1>

  <p id="estadoPago" class="mt-3 rounded-2xl border border-[#8cc63f]/20 bg-[#8cc63f]/10 px-4 py-3 text-center text-sm font-medium text-slate-600">
    Confirmando tu pedido...
  </p>

  <div class="mt-6 space-y-3">
    <button onclick="irInicio()"
      class="w-full rounded-2xl bg-[linear-gradient(135deg,_#0b2a6b,_#123f89)] px-4 py-3 text-sm font-bold text-white shadow-[0_18px_30px_rgba(11,42,107,0.22)] transition hover:-translate-y-0.5 hover:shadow-[0_22px_34px_rgba(11,42,107,0.28)]">
      Volver al inicio
    </button>

    <button onclick="verPedidos()"
      class="w-full rounded-2xl border border-[#0b2a6b]/15 bg-white px-4 py-3 text-sm font-semibold text-[#0b2a6b] transition hover:border-[#0b2a6b] hover:bg-[#0b2a6b] hover:text-white">
      Ver mis pedidos
    </button>
  </div>

</div>
</section>
</main>

<script>
const estadoPago = document.getElementById("estadoPago");

const API_URL = "https://woof-wash.onrender.com";

function obtenerApiBase() {
  const hostname = window.location.hostname;

  const esLocal =
    hostname === "localhost" ||
    hostname === "127.0.0.1";

  if (esLocal) {
    return "http://localhost:3000";
  }

  return API_URL;
}
function irInicio() {
  window.location.href = "index.html";
}

function verPedidos() {
  localStorage.setItem("abrirCarritoAlRegresar", "true");
  localStorage.setItem("mostrarPedidosAlRegresar", "true");
  window.location.href = "index.html";
}

function limpiarCompraFinalizada() {
  localStorage.removeItem("carrito");
  localStorage.removeItem("direccion");
  localStorage.removeItem("abrirCarritoAlRegresar");
  localStorage.removeItem("mostrarPedidosAlRegresar");
}

async function confirmarPedido() {
  const token = localStorage.getItem("token");
  const sessionId = new URLSearchParams(window.location.search).get("session_id");

  if (!token || !sessionId) {
    estadoPago.textContent = "Tu pago fue exitoso. Puedes volver al inicio para revisar tu carrito.";
    return;
  }

  try {
    const res = await fetch(`${obtenerApiBase()}/confirm-order`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({ sessionId })
    });

    const data = await res.json().catch(() => ({
      message: "No se pudo procesar la confirmación del pedido"
    }));

    if (res.ok) {
      limpiarCompraFinalizada();
      estadoPago.textContent = "Tu pedido quedó registrado correctamente.";
      return;
    }

    estadoPago.textContent = data.message || "El pago fue exitoso, pero no se pudo confirmar el pedido.";
  } catch (error) {
    estadoPago.textContent = "El pago fue exitoso, pero no se pudo confirmar el pedido en este momento.";
  }
}

confirmarPedido();
</script>

</body>
</html>
